<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Novacart</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ============ NAVBAR ============ -->
    <header class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo">Novacart</a>
            <button class="hamburger-btn" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="#">Shop</a>
                <a href="about.html">About</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
            <div class="navbar-icons">
                <button class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
                <button class="search-toggle" aria-label="Search">🔍</button>
                <a href="wishlist.html" aria-label="Wishlist">🤍</a>
                <a href="#" aria-label="Cart">🛒 <span class="cart-count">0</span></a>
            </div>
        </div>
    </header>

    <!-- ============ CONTACT CONTENT ============ -->
    <section class="contact-page">
        <div class="section-header">
            <h2>Get in Touch</h2>
            <p>We'd love to hear from you</p>
        </div>

        <div class="contact-container">

            <div class="contact-info">
                <div class="contact-info-item">
                    <h3>📍 Address</h3>
                    <p>123 Fashion Street, Kolhapur, Maharashtra, India</p>
                </div>
                <div class="contact-info-item">
                    <h3>📧 Email</h3>
                    <p>support@novacart.com</p>
                </div>
                <div class="contact-info-item">
                    <h3>📞 Phone</h3>
                    <p>+91 98765 43210</p>
                </div>
            </div>

            <form class="contact-form" id="contactForm">
                <div class="form-group">
                    <label for="contactName">Name</label>
                    <input type="text" id="contactName" required>
                </div>
                <div class="form-group">
                    <label for="contactEmail">Email</label>
                    <input type="email" id="contactEmail" required>
                </div>
                <div class="form-group">
                    <label for="contactMessage">Message</label>
                    <textarea id="contactMessage" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Send Message</button>
            </form>

        </div>
    </section>

    <!-- ============ SEARCH OVERLAY ============ -->
    <div class="search-overlay">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off">
            <button class="search-close" aria-label="Close search">&times;</button>
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>

    <!-- ============ CART SIDEBAR ============ -->
    <div class="cart-overlay"></div>
    <aside class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="cart-close" aria-label="Close cart">&times;</button>
        </div>
        <div class="cart-items"><p class="cart-empty-msg">Your cart is empty.</p></div>
        <div class="cart-footer">
            <div class="cart-total-row"><span>Total:</span><span class="cart-total-amount">₹0</span></div>
            <a href="checkout.html" class="btn-primary cart-checkout-btn">Checkout</a>
        </div>
    </aside>
<!-- ============ BACK TO TOP BUTTON ============ -->
    <button class="back-to-top" id="backToTopBtn" aria-label="Back to top">↑</button>
    <script src="js/script.js"></script>
</body>
</html>
