<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell on Novacart</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="page-loader" id="pageLoader">
        <div class="loader-spinner"></div>
    </div>

    <header class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo">Novacart</a>
            <button class="hamburger-btn" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="sell.html" class="active">Sell</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="navbar-icons">
                <button class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
                <button class="search-toggle" aria-label="Search">🔍</button>
                <a href="login.html" id="authLink" class="auth-link">Login</a>
                <a href="wishlist.html" aria-label="Wishlist">🤍</a>
                <a href="#" aria-label="Cart">🛒 <span class="cart-count">0</span></a>
            </div>
        </div>
    </header>

    <div class="back-button-wrapper">
        <button class="back-button" onclick="window.history.back()">← Back</button>
    </div>

    <!-- ============ SELL / ADD PRODUCT FORM ============ -->
    <section class="sell-page">
        <div class="section-header">
            <h2>Sell on Novacart</h2>
            <p>List your own product for other shoppers to discover</p>
        </div>

        <div class="sell-form-card">
            <form id="sellForm">
                <div class="form-group">
                    <label for="sellName">Product Name</label>
                    <input type="text" id="sellName" required>
                </div>

                <div class="form-group">
                    <label for="sellPrice">Price (₹)</label>
                    <input type="number" id="sellPrice" min="1" required>
                </div>

                <div class="form-group">
                    <label for="sellCategory">Category</label>
                    <select id="sellCategory" required>
                        <option value="">Select a category</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Footwear">Footwear</option>
                        <option value="Apparel">Apparel</option>
                        <option value="Home">Home</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="sellImage">Image URL</label>
                    <input type="url" id="sellImage" placeholder="https://..." required>
                    <p class="form-hint">Paste a link to an image (e.g. from Unsplash). File uploads aren't supported yet.</p>
                </div>

                <div class="form-group">
                    <label for="sellDescription">Description</label>
                    <textarea id="sellDescription" rows="4" required></textarea>
                </div>

                <p class="auth-error" id="sellError"></p>
                <p class="sell-success" id="sellSuccess"></p>

                <button type="submit" class="btn-primary sell-submit-btn">List Product</button>
            </form>
        </div>
    </section>

    <div class="search-overlay">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off">
            <button class="search-close" aria-label="Close search">&times;</button>
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>

    <div class="cart-overlay"></div>
    <aside class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="cart-close" aria-label="Close cart">&times;</button>
        </div>
        <div class="cart-items"><p class="cart-empty-msg">Your cart is empty.</p></div>
        <div class="cart-footer">
            <div class="cart-total-row"><span>Total:</span><span class="cart-total-amount">₹0</span></div>
            <a href="checkout.html" class="btn-primary cart-checkout-btn">Checkout</a>
        </div>
    </aside>

    <button class="back-to-top" id="backToTopBtn" aria-label="Back to top">↑</button>

    <script src="js/script.js"></script>
</body>
</html>
