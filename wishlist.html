<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist | Novacart</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<!-- ============ PAGE LOADER ============ -->
    <div class="page-loader" id="pageLoader">
        <div class="loader-spinner"></div>
    </div>
    <!-- ============ NAVBAR ============ -->
    <header class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo">Novacart</a>

            <button class="hamburger-btn" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="sell.html">Shop</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>

            <div class="navbar-icons">
                <button class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
                <button class="search-toggle" aria-label="Search">🔍</button>
                <a href="login.html" id="authLink" class="auth-link">Login</a>
                <a href="wishlist.html" aria-label="Wishlist">🤍</a>
                <a href="#" aria-label="Cart">🛒 <span class="cart-count">0</span></a>
            </div>
        </div>
    </header>
<!-- ============ BACK BUTTON ============ -->
    <div class="back-button-wrapper">
        <button class="back-button" onclick="window.history.back()">← Back</button>
    </div>
    <!-- ============ WISHLIST CONTENT ============ -->
    <section class="wishlist-page">
        <div class="section-header">
            <h2>My Wishlist</h2>
            <p>Products you've saved for later</p>
        </div>

        <div class="wishlist-grid" id="wishlistGrid">
            <!-- Wishlist items will be inserted here by JavaScript -->
        </div>
    </section>
<!-- ============ SEARCH OVERLAY ============ -->
    <div class="search-overlay">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off">
            <button class="search-close" aria-label="Close search">&times;</button>
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>
    <!-- ============ CART SIDEBAR ============ -->
    <div class="cart-overlay"></div>

    <aside class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="cart-close" aria-label="Close cart">&times;</button>
        </div>

        <div class="cart-items">
            <p class="cart-empty-msg">Your cart is empty.</p>
        </div>

        <div class="cart-footer">
            <div class="cart-total-row">
                <span>Total:</span>
                <span class="cart-total-amount">₹0</span>
            </div>
            <a href="checkout.html" class="btn-primary cart-checkout-btn">Checkout</a>
        </div>
    </aside>
<!-- ============ BACK TO TOP BUTTON ============ -->
    <button class="back-to-top" id="backToTopBtn" aria-label="Back to top">↑</button>
    <script src="js/script.js"></script>
</body>

</html>
