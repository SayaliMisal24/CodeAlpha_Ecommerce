<!DOCTYPE html>
<!-- This line tells the browser: "this is a modern HTML5 document" -->
<html lang="en">
<!-- <html> wraps the entire page. lang="en" tells browsers/screen readers the page is in English -->

<head>
    <!-- The <head> holds info ABOUT the page — not visible content itself -->
    <meta charset="UTF-8">
    <!-- Ensures special characters (like ₹, é, emojis) display correctly -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes the page responsive — it will scale correctly on mobile phones -->

    <title>CodeAlpha Ecommerce | Home</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- This text shows up in the browser tab -->
</head>

<body>
  <!-- ============ NAVBAR ============ -->
    <header class="navbar">
        <div class="navbar-container">

            <!-- Logo / Brand Name -->
            <a href="#" class="logo">ShopEase</a>

            <!-- Navigation Links -->
            <nav class="nav-links">
                <a href="#" class="active">Home</a>
                <a href="#">Shop</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>

            <!-- Right side icons: search, cart, wishlist -->
            <div class="navbar-icons">
                <a href="#" aria-label="Search">🔍</a>
                <a href="#" aria-label="Wishlist">🤍</a>
                <a href="#" aria-label="Cart">🛒 <span class="cart-count">0</span></a>
            </div>

        </div>
    </header>
    <!-- Everything VISIBLE on the page goes inside <body> -->
    <h1>Hello, my e-commerce website is coming soon!</h1>
    <!-- Just a placeholder heading so we can test that this works -->
    <script src="js/script.js"></script>
  </body>

</html>
