<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Novacart</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<!-- ============ PAGE LOADER ============ -->
    <div class="page-loader" id="pageLoader">
        <div class="loader-spinner"></div>
    </div>
    <!-- ============ NAVBAR ============ -->
    <header class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo">Novacart</a>

            <button class="hamburger-btn" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="sell.html">Shop</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                </nav>

            <div class="navbar-icons">
                <button class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
                <button class="search-toggle" aria-label="Search">🔍</button>
                <a href="login.html" id="authLink" class="auth-link">Login</a>
                <a href="wishlist.html" aria-label="Wishlist">🤍</a>
                <a href="#" aria-label="Cart">🛒 <span class="cart-count">0</span></a>
            </div>
        </div>
    </header>
    <!-- ============ BACK BUTTON ============ -->
    <div class="back-button-wrapper">
        <button class="back-button" onclick="window.history.back()">← Back</button>
    </div>


    <!-- ============ PRODUCT DETAILS ============ -->
    <section class="product-details">
        <div class="product-details-container">

            <!-- Left: Product image -->
            <div class="product-details-image">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600" alt="Classic Leather Watch" id="productImage">
            </div>

            <!-- Right: Product info -->
            <div class="product-details-info">
                <h1 id="productName">Classic Leather Watch</h1>
                <p class="product-details-price" id="productPrice">₹7,499</p>

                <p class="product-details-description" id="productDescription">
                    Loading...
                </p>

                <div class="product-details-meta">
                    <p><strong>Availability:</strong> In Stock</p>
                    <p><strong>Category:</strong> <span id="productCategory">-</span></p>
                </div>

                <!-- Quantity selector -->
                <div class="quantity-selector">
                    <button class="qty-btn" id="decreaseQty">-</button>
                    <span class="qty-value" id="qtyDisplay">1</span>
                    <button class="qty-btn" id="increaseQty">+</button>
                </div>

                <button class="btn-primary btn-add-cart-details" id="addToCartDetailsBtn"
                    data-id="1" data-name="Classic Leather Watch" data-price="7499"
                    data-image="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600">
                    Add to Cart
                </button>
            </div>

        </div>
    </section>
<!-- ============ SEARCH OVERLAY ============ -->
    <div class="search-overlay">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off">
            <button class="search-close" aria-label="Close search">&times;</button>
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>
    <!-- ============ CART SIDEBAR ============ -->
    <div class="cart-overlay"></div>

    <aside class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="cart-close" aria-label="Close cart">&times;</button>
        </div>

        <div class="cart-items">
            <p class="cart-empty-msg">Your cart is empty.</p>
        </div>

        <div class="cart-footer">
            <div class="cart-total-row">
                <span>Total:</span>
                <span class="cart-total-amount">₹0</span>
            </div>
            <a href="checkout.html" class="btn-primary cart-checkout-btn">Checkout</a>
        </div>
    </aside>
    <!-- ============ BACK TO TOP BUTTON ============ -->
    <button class="back-to-top" id="backToTopBtn" aria-label="Back to top">↑</button>
    <script src="js/script.js"></script>
</body>

</html>
